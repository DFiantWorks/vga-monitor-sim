name: Artifact test (reusable)

# Drive the gradient design against the PREBUILT bundles (uploaded earlier in the
# run by build-artifacts.yml) with every FOSS simulator available per OS, and
# compare the streamed frame to the golden. The backend is NOT recompiled -- each
# simulator links/loads the shipped library, exactly as a downstream user would.
# Reused by ci.yml (PR / push) and release.yml (gate a tag before publishing).
on:
  workflow_call:

jobs:
  # POSIX bundles: Verilator (DPI), GHDL + NVC (VHPIDIRECT), Icarus (VPI), on
  # both Linux and macOS. The harness skips any simulator that isn't installed.
  artifact-test:
    name: artifact-test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, os: ubuntu-latest,    artifact: vga-monitor-linux-x86_64 }
          - { name: linux-arm64,  os: ubuntu-24.04-arm,  artifact: vga-monitor-linux-arm64 }
          - { name: macos-arm64,  os: macos-15,          artifact: vga-monitor-macos-arm64 }
          - { name: macos-x86_64, os: macos-15-intel,    artifact: vga-monitor-macos-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install FOSS simulators + viewer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential verilator iverilog ffmpeg iproute2

      - name: Install FOSS simulators + viewer (macOS)
        if: runner.os == 'macOS'
        run: brew install verilator ghdl icarus-verilog ffmpeg

      - name: Install NVC
        uses: ./.github/actions/setup-nvc      # installs Homebrew on arm64 Linux too

      # GHDL (llvm backend) for the prebuilt-bundle test: modern GHDL via the
      # official action on x86_64; apt's ghdl-gcc on arm64 (no arm64 asset, and
      # noble's ghdl-llvm is broken -- missing libLLVM-18.so.18.1).
      - name: Setup GHDL (Linux x86_64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        uses: ghdl/setup-ghdl@v1
        with:
          backend: llvm
      - name: Setup GHDL (Linux arm64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: sudo apt-get install -y ghdl-gcc

      - name: Test prebuilt artifacts against all available simulators
        run: python3 tests/stream_e2e.py --dist dist

  # Windows (MinGW) bundle: Verilator (DPI, links the shipped import lib), NVC
  # (VHPI, loaded at runtime with --load), and Icarus (VPI, loads the shipped
  # .vpi). GHDL/VHPI is split into its own job below: ghdl-llvm pulls a newer
  # gcc/libstdc++ (via gcc-ada) that is ABI-skewed against the prebuilt Verilator
  # package and breaks its link, so the two can't share one MSYS2 toolchain.
  # Not run here: the MSVC bundle -- only commercial sims (Questa) consume it.
  artifact-test-windows:
    name: artifact-test (windows-x86_64-mingw)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v8
        with:
          name: vga-monitor-windows-x86_64-mingw
          path: dist
      # NVC isn't packaged in MSYS2, so install the native MinGW-based .msi and
      # let path-type:inherit expose it to the MSYS2 shell below.
      - name: Install NVC
        uses: nickg/setup-nvc@v1
        with:
          version: latest
      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-verilator
            mingw-w64-x86_64-iverilog
            mingw-w64-x86_64-ffmpeg
      - name: Test prebuilt artifacts (Verilator/DPI, NVC/VHPI runtime --load, Icarus/VPI)
        shell: msys2 {0}
        run: |
          verilator --version
          nvc --version
          iverilog -V | head -1
          python3 tests/stream_e2e.py --dist dist --sim dpi,nvc,vpi

  # Windows GHDL/VHPI, isolated (see note above). GHDL's LLVM backend links the
  # shipped VHPI import lib at elaboration and loads the DLL at run time. The
  # mcode backend (no link step) loads the DLL via the generated _mcode wrapper
  # instead -- exercised in its own jobs below.
  artifact-test-windows-ghdl:
    name: artifact-test (windows-x86_64-mingw, GHDL)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v8
        with:
          name: vga-monitor-windows-x86_64-mingw
          path: dist
      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ghdl-llvm
            mingw-w64-x86_64-ffmpeg
      - name: Test prebuilt artifacts (GHDL/VHPI, LLVM backend)
        shell: msys2 {0}
        run: |
          # Informational only, and non-fatal: some rolling MSYS2 ghdl builds
          # raise an Ada DEVICE_ERROR just printing --version on Windows.
          ghdl --version | head -1 || true
          python3 tests/stream_e2e.py --dist dist --sim vhpi

  # GHDL mcode backend (x86_64 only -- mcode has no arm64/macOS codegen). No link
  # step: it loads the prebuilt VHPI library named in the generated _mcode
  # wrapper. Separate from the gcc/llvm jobs because one `ghdl` install is one
  # backend. Linux here; Windows below.
  artifact-test-mcode:
    name: artifact-test (linux-x86_64, GHDL mcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v8
        with:
          name: vga-monitor-linux-x86_64
          path: dist
      - name: Install viewer + net tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make ffmpeg iproute2
      - name: Setup GHDL (mcode)
        uses: ghdl/setup-ghdl@v1
        with:
          backend: mcode
      - name: Test prebuilt artifact (GHDL/VHPI, mcode backend)
        run: |
          ghdl --version | head -1 || true
          python3 tests/stream_e2e.py --dist dist --sim mcode

  # Windows GHDL mcode. Install the mcode package EXPLICITLY: the bare
  # mingw-w64-x86_64-ghdl name resolves to the LLVM provider (used in the job
  # above), so it must be -ghdl-mcode here, not -ghdl.
  artifact-test-windows-mcode:
    name: artifact-test (windows-x86_64-mingw, GHDL mcode)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v8
        with:
          name: vga-monitor-windows-x86_64-mingw
          path: dist
      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ghdl-mcode
            mingw-w64-x86_64-ffmpeg
      - name: Test prebuilt artifact (GHDL/VHPI, mcode backend)
        shell: msys2 {0}
        run: |
          ghdl --version | head -1 || true
          python3 tests/stream_e2e.py --dist dist --sim mcode
